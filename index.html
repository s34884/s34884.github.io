<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแนะนำตัวของอรณิฎาศ์</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            font-family:'Segoe UI',sans-serif;

            background:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,.8) 0 50px, transparent 51px),
            radial-gradient(circle at 80% 30%, rgba(255,255,255,.7) 0 40px, transparent 41px),
            radial-gradient(circle at 30% 80%, rgba(255,255,255,.6) 0 45px, transparent 46px),
            linear-gradient(135deg,#dff7ff,#f9e7ff,#fff6d9);

            color:#555;
        }

        .card{
            background:rgba(255,255,255,0.95);
            width:100%;
            max-width:420px;
            padding:25px;
            text-align:center;
            border-radius:30px;
            box-shadow:0 15px 35px rgba(160,180,255,.25);
            border:3px solid rgba(255,255,255,.7);
            backdrop-filter:blur(5px);

            animation:floatCard 3s ease-in-out infinite;
        }

        .card-header{
            height:160px;
            border-radius:25px;
            margin-bottom:20px;

            background:
            linear-gradient(
                135deg,
                #d6f4ff,
                #e9dcff,
                #fff3c9
            );

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;

            font-size:60px;
        }

        .cute{
            font-size:20px;
            margin-top:5px;
        }

        h1{
            color:#6a8cff;
            font-size:25px;
            margin-bottom:15px;
            line-height:1.4;
        }

        p{
            font-size:16px;
            line-height:1.8;
            margin:10px 0;
        }

        .btn{
            display:block;
            margin-top:25px;
            padding:15px;

            text-decoration:none;
            color:white;
            font-weight:bold;

            border-radius:999px;

            background:linear-gradient(
                45deg,
                #8ec5ff,
                #bca7ff,
                #ffc8dd
            );

            box-shadow:0 6px 15px rgba(170,150,255,.35);
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(170,150,255,.45);
        }

        .tag{
            display:inline-block;
            background:#eef8ff;
            color:#6a8cff;
            padding:8px 14px;
            border-radius:20px;
            margin-bottom:15px;
            font-size:14px;
            font-weight:600;
        }

        .footer{
            margin-top:18px;
            color:#9aa7ff;
            font-size:14px;
        }

        @keyframes floatCard{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-6px);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="card-header">
            🐰☁️🐻
            <div class="cute">✨ Pastel Dream ✨</div>
        </div>

        <h1>
            ยินดีต้อนรับสู่โปรไฟล์ของ<br>
            อรณิฎาศ์ (Onnida)
        </h1>

        <div class="tag">
            🌸 Student • Gifted Program • Health Science 🌸
        </div>

        <p>
            ขณะนี้กำลังศึกษาและสนใจ
            Gifted Program และ วิทยาศาสตร์สุขภาพค่ะ 💖
        </p>

        <p>
            นี่คือเว็บไซต์แรกของดิฉัน
            ที่โฮสต์บน GitHub Pages 🌈✨
        </p>

        <a href="portfolio.html" class="btn">
            📖 ดูแฟ้มสะสมงานของดิฉัน
        </a>

        <div class="footer">
            ☁️ Made with love by Onnida ☁️
        </div>

    </div>

</body>
</html>
```
