<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแนะนำตัวของอรณิฎาศ์</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            font-family:'Segoe UI',sans-serif;

            background:
            radial-gradient(circle at 15% 20%, rgba(255,255,255,.9) 0 45px, transparent 46px),
            radial-gradient(circle at 80% 25%, rgba(255,255,255,.8) 0 35px, transparent 36px),
            radial-gradient(circle at 30% 80%, rgba(255,255,255,.7) 0 50px, transparent 51px),
            radial-gradient(circle at 75% 75%, rgba(255,255,255,.8) 0 40px, transparent 41px),
            linear-gradient(135deg,#dff4ff,#b3e5fc,#eaf8ff);
        }

        .card{
            background:rgba(255,255,255,0.95);
            width:100%;
            max-width:430px;
            border-radius:30px;
            padding:25px;
            text-align:center;
            box-shadow:0 15px 40px rgba(102,181,255,.25);
            border:3px solid #e3f6ff;
            animation:fadeIn 0.8s ease;
        }

        .card-header{
            height:170px;
            border-radius:25px;
            margin-bottom:20px;

            background:
            radial-gradient(circle at 20% 30%, white 0 25px, transparent 26px),
            radial-gradient(circle at 35% 30%, white 0 30px, transparent 31px),
            radial-gradient(circle at 50% 30%, white 0 25px, transparent 26px),
            linear-gradient(180deg,#dff4ff,#b3e5fc);

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:80px;
        }

        h1{
            color:#4da6d9;
            font-size:26px;
            margin-bottom:15px;
            line-height:1.4;
        }

        p{
            color:#555;
            font-size:16px;
            line-height:1.8;
            margin:10px 0;
        }

        .btn{
            display:block;
            text-decoration:none;
            margin-top:25px;
            padding:15px;

            background:linear-gradient(
                45deg,
                #81d4fa,
                #4fc3f7
            );

            color:white;
            font-weight:bold;
            border-radius:50px;
            transition:.3s;
            box-shadow:0 5px 15px rgba(79,195,247,.4);
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(79,195,247,.5);
        }

        .cute-text{
            color:#7ab7dd;
            font-weight:600;
            margin-bottom:10px;
        }

        .footer{
            margin-top:18px;
            color:#90caf9;
            font-size:14px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="card-header">
            ☁️🐶☁️
        </div>

        <h1>
            ยินดีต้อนรับสู่โปรไฟล์ของ<br>
            อรณิฎาศ์ (Onnida)
        </h1>

        <div class="cute-text">
            Cinnamoroll Blue Sky Theme 💙
        </div>

        <p>
            ขณะนี้กำลังศึกษาและสนใจ
            Gifted Program & ด้านวิทย์สุขภาพค่ะ ✨
        </p>

        <p>
            นี่คือเว็บไซต์แรกของดิฉัน
            ที่โฮสต์บน GitHub Pages ☁️
        </p>

        <a href="portfolio.html" class="btn">
            📖 ดูแฟ้มสะสมงานของดิฉัน
        </a>

        <div class="footer">
            Made with 💙 by Onnida
        </div>

    </div>

</body>
</html>
```
