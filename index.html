<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของอรณิฎาศ์</title>
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: sans-serif;
            color: #333;
            padding: 10px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .card-header {
            height: 100px;
            background: linear-gradient(45deg, #e3f2fd, #fce4ec, #e1f5fe);
            border-radius: 15px;
            margin-bottom: 25px;
        }
        h1 { 
            color: #1565c0; 
            font-size: 24px; 
            margin-bottom: 15px; 
        }
        p { 
            font-size: 16px; 
            line-height: 1.5; 
            margin: 10px 0; 
        }
        .btn {
            display: block;
            background: #1565c0;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของอรณิฎาศ์ (Onnida)</h1>
        <p>ขณะนี้กำลังศึกษาและสนใจด้านการวาดรูปค่ะ</p>
        <p>นี่คือเว็บไซต์แรกของดิฉันที่โฮสต์บน GitHub Pages</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมงานของดิฉัน</a>
    </div>

</body>
</html>
