<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แฟ้มสะสมงานของอรณิฎาศ์</title>
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #1565c0; text-align: center; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .work-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #eee;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #1565c0;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>แฟ้มสะสมงานของอรณิฎาศ์ (Onnida)</h1>
        <p style="text-align: center;">ยินดีต้อนรับสู่ผลงานการวาดรูปของดิฉันค่ะ</p>
        
        <div class="gallery">
            <div class="work-item">รูปผลงานที่ 1</div>
            <div class="work-item">รูปผลงานที่ 2</div>
            <div class="work-item">รูปผลงานที่ 3</div>
        </div>

        <a href="index.html" class="back-link">← กลับหน้าแรก</a>
    </div>

</body>
</html>
